<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Financial Manager – Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">
<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow" style="width: 420px;">
        <div class="card-body p-4">
            <div class="text-center mb-4">
                <i class="bi bi-graph-up-arrow fs-1 text-primary"></i>
                <h3 class="mt-2 fw-bold">Financial Manager</h3>
                <p class="text-muted small">Enter your email to access your financial dashboard</p>
            </div>
            <div class="alert alert-warning d-flex align-items-start gap-2 mb-3"
                 th:if="${param.error != null and param.error[0] == 'email_not_found'}">
                <i class="bi bi-exclamation-triangle-fill mt-1 flex-shrink-0"></i>
                <div>
                    <strong>Email not recognized.</strong>
                    The configured email was not found in the system.
                    Enter a different email below — it will be used for this session only.
                </div>
            </div>
            <form th:action="@{/ui/session}" method="post">
                <div class="mb-3">
                    <label for="email" class="form-label fw-semibold">Email address</label>
                    <input type="email" id="email" name="email" class="form-control form-control-lg"
                           placeholder="you@example.com" required autofocus>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-lg">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Access Dashboard
                    </button>
                </div>
            </form>
            <hr class="my-4">
            <p class="text-center text-muted small mb-0">
                <i class="bi bi-shield-lock me-1"></i>REST API also available at
                <a href="/swagger-ui.html" target="_blank">/swagger-ui.html</a>
            </p>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
