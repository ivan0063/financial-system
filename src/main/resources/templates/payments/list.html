<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Payments – Financial Manager</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">

<div th:replace="~{layout/navbar :: navbar}"></div>

<div class="container">
    <div class="d-flex align-items-center mb-4">
        <a th:href="@{/ui/debt-accounts/{code}(code=${debtAccountCode})}" class="btn btn-outline-secondary me-3">
            <i class="bi bi-arrow-left"></i>
        </a>
        <h2 class="fw-bold mb-0">
            <i class="bi bi-clock-history me-2 text-primary"></i>Payment History
            <small class="fs-6 text-muted fw-normal ms-2 font-monospace" th:text="${debtAccountCode}"></small>
        </h2>
    </div>

    <!-- Payment error alert -->
    <div class="alert alert-danger mb-3" th:if="${paymentError != null}">
        <div class="d-flex align-items-center gap-2 mb-2">
            <i class="bi bi-exclamation-triangle-fill fs-5"></i>
            <strong>Payment failed</strong>
        </div>
        <div class="position-relative">
            <div class="font-monospace small p-2 bg-danger bg-opacity-10 rounded border border-danger border-opacity-25"
                 th:text="${paymentError}"
                 style="word-break: break-word; white-space: pre-wrap; padding-right: 2.5rem !important;"></div>
            <button type="button"
                    class="btn btn-sm btn-outline-secondary position-absolute top-0 end-0 m-1"
                    title="Copy to clipboard"
                    onclick="copyEl(this, this.previousElementSibling)">
                <i class="bi bi-clipboard"></i>
            </button>
        </div>
        <div class="mt-2 small text-muted">
            <i class="bi bi-terminal me-1"></i>Open the <strong>Activity Log</strong> (top-right) for the full exception details.
        </div>
    </div>

    <!-- Do Payment Button -->
    <div class="mb-4">
        <form th:action="@{/ui/payments/{code}(code=${debtAccountCode})}" method="post">
            <button type="submit" class="btn btn-success"
                    onclick="return confirm('Process a payment for this account?')">
                <i class="bi bi-cash-coin me-2"></i>Process Payment
            </button>
        </form>
    </div>

    <!-- Payments Table -->
    <div class="card shadow-sm" th:if="${!payments.empty}">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th>Date</th>
                    <th>Amount Paid</th>
                    <th>Account</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="payment : ${payments}">
                    <td class="text-muted" th:text="${payment.id}"></td>
                    <td th:text="${#temporals.format(payment.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                    <td class="fw-semibold text-success"
                        th:text="${'$' + #numbers.formatDecimal(payment.amountPaid, 1, 2)}"></td>
                    <td class="font-monospace small" th:text="${payment.debtAccount?.code}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
    <div class="alert alert-info" th:if="${payments.empty}">
        <i class="bi bi-info-circle me-2"></i>No payment history for this account.
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
