<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/ui/dashboard}">
            <i class="bi bi-graph-up-arrow me-2"></i>Financial Manager
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/ui/dashboard}">
                        <i class="bi bi-speedometer2 me-1"></i>Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/ui/providers}">
                        <i class="bi bi-bank me-1"></i>Providers
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/ui/fixed-expenses}">
                        <i class="bi bi-receipt me-1"></i>Fixed Expenses
                    </a>
                </li>
            </ul>
            <span class="navbar-text text-light" th:if="${email != null}">
                <i class="bi bi-person-circle me-1"></i>
                <span th:text="${email}"></span>
            </span>
        </div>
    </div>
</nav>
</body>
</html>
