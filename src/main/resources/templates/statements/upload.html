<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Upload Statement – Financial Manager</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">

<div th:replace="~{layout/navbar :: navbar}"></div>

<div class="container">
    <div class="d-flex align-items-center mb-4">
        <a th:href="@{/ui/debt-accounts/{code}(code=${debtAccountCode})}" class="btn btn-outline-secondary me-3">
            <i class="bi bi-arrow-left"></i>
        </a>
        <div>
            <h2 class="fw-bold mb-0">
                <i class="bi bi-file-earmark-arrow-up me-2 text-primary"></i>Upload Account Statement
            </h2>
            <div class="text-muted small" th:if="${account != null}">
                <span th:text="${account.name}"></span>
                <span class="font-monospace ms-2" th:text="${'[' + debtAccountCode + ']'}"></span>
                <span class="badge bg-secondary ms-2" th:text="${account.accountStatementType}"></span>
            </div>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-7">

            <!-- Extract & Preview -->
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-white">
                    <h5 class="mb-0 fw-semibold">
                        <i class="bi bi-search me-2 text-info"></i>Step 1 — Extract &amp; Preview
                    </h5>
                    <small class="text-muted">Extracts debts from the file for review before saving. Nothing is persisted.</small>
                </div>
                <div class="card-body">
                    <form th:action="@{/ui/statements/{code}/extract(code=${debtAccountCode})}"
                          method="post" enctype="multipart/form-data">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Statement File</label>
                            <input type="file" name="file" class="form-control" required
                                   accept=".pdf,.xlsx,.xls,.csv">
                            <div class="form-text">Accepted: PDF, Excel (xlsx/xls), CSV</div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Statement Format</label>
                            <select name="accountStatementType" class="form-select" required>
                                <option th:each="type : ${statementTypes}"
                                        th:value="${type}"
                                        th:text="${type}"
                                        th:selected="${account != null and account.accountStatementType == type}">
                                </option>
                            </select>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-info text-white">
                                <i class="bi bi-eye me-2"></i>Extract &amp; Preview Debts
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Full Sync -->
            <div class="card shadow-sm border-warning">
                <div class="card-header bg-warning bg-opacity-10">
                    <h5 class="mb-0 fw-semibold">
                        <i class="bi bi-arrow-repeat me-2 text-warning"></i>Step 1 (Alt) — Full Sync
                    </h5>
                    <small class="text-muted">Extracts and immediately persists. Deactivates debts no longer in the statement.</small>
                </div>
                <div class="card-body">
                    <form th:action="@{/ui/statements/{code}/sync(code=${debtAccountCode})}"
                          method="post" enctype="multipart/form-data">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Statement File</label>
                            <input type="file" name="file" class="form-control" required
                                   accept=".pdf,.xlsx,.xls,.csv">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Statement Format</label>
                            <select name="accountStatementType" class="form-select" required>
                                <option th:each="type : ${statementTypes}"
                                        th:value="${type}"
                                        th:text="${type}"
                                        th:selected="${account != null and account.accountStatementType == type}">
                                </option>
                            </select>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-warning"
                                    onclick="return confirm('Full sync will deactivate debts not in this statement. Continue?')">
                                <i class="bi bi-arrow-repeat me-2"></i>Full Sync (Persist Immediately)
                            </button>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
