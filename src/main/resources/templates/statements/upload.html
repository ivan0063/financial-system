<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Upload Statement – Financial Manager</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">

<div th:replace="~{layout/navbar :: navbar}"></div>

<div class="container">
    <div class="d-flex align-items-center mb-4">
        <a th:href="@{/ui/debt-accounts/{code}(code=${debtAccountCode})}" class="btn btn-outline-secondary me-3">
            <i class="bi bi-arrow-left"></i>
        </a>
        <div>
            <h2 class="fw-bold mb-0">
                <i class="bi bi-file-earmark-arrow-up me-2 text-primary"></i>Upload Account Statement
            </h2>
            <div class="text-muted small" th:if="${account != null}">
                <span th:text="${account.name}"></span>
                <span class="font-monospace ms-2" th:text="${'[' + debtAccountCode + ']'}"></span>
                <span class="badge bg-secondary ms-2" th:text="${account.accountStatementType}"></span>
            </div>
        </div>
    </div>

    <div class="alert alert-danger mb-3" th:if="${extractionError != null}">
        <div class="d-flex align-items-center gap-2 mb-2">
            <i class="bi bi-exclamation-triangle-fill fs-5"></i>
            <strong>Extraction failed</strong>
        </div>
        <div class="font-monospace small p-2 bg-danger bg-opacity-10 rounded border border-danger border-opacity-25"
             th:text="${extractionError}" style="word-break: break-word; white-space: pre-wrap;"></div>
        <div class="mt-2 small text-muted">
            <i class="bi bi-terminal me-1"></i>Open the <strong>Activity Log</strong> (top-right) for the full exception details.
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    <h5 class="mb-0 fw-semibold">
                        <i class="bi bi-search me-2 text-primary"></i>Extract &amp; Preview
                    </h5>
                    <small class="text-muted">Debts are extracted for review. Choose how to persist from the preview screen.</small>
                </div>
                <div class="card-body">
                    <form th:action="@{/ui/statements/{code}/extract(code=${debtAccountCode})}"
                          method="post" enctype="multipart/form-data">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Statement File</label>
                            <input type="file" name="file" class="form-control" required
                                   accept=".pdf,.xlsx,.xls,.csv">
                            <div class="form-text">Accepted: PDF, Excel (xlsx/xls), CSV</div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Statement Format</label>
                            <select name="accountStatementType" class="form-select" required>
                                <option th:each="type : ${statementTypes}"
                                        th:value="${type}"
                                        th:text="${type}"
                                        th:selected="${account != null and account.accountStatementType == type}">
                                </option>
                            </select>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-eye me-2"></i>Extract &amp; Preview
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
