<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Progresión de Deudas – Financial Manager</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        .timeline-line {
            border-left: 3px solid #dee2e6;
            padding-left: 1.5rem;
            margin-left: 0.75rem;
        }
        .timeline-dot {
            width: 1.5rem;
            height: 1.5rem;
            border-radius: 50%;
            margin-left: -0.15rem;
        }
        .closing-badge { font-size: 0.75rem; }
    </style>
</head>
<body class="bg-light">

<div th:replace="~{layout/navbar :: navbar}"></div>

<div class="container py-4">

    <!-- Header -->
    <div class="d-flex align-items-center mb-4">
        <a th:href="@{/ui/dashboard}" class="btn btn-outline-secondary me-3">
            <i class="bi bi-arrow-left"></i>
        </a>
        <div>
            <h2 class="fw-bold mb-0">
                <i class="bi bi-calendar2-range me-2 text-primary"></i>Progresión de Deudas
            </h2>
            <small class="text-muted">Simulación mes a mes hasta la fecha objetivo</small>
        </div>
    </div>

    <!-- Target month form -->
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body">
            <form method="get" th:action="@{/ui/progression}" class="row g-3 align-items-end">
                <div class="col-md-4">
                    <label for="targetMonth" class="form-label fw-semibold">Fecha objetivo</label>
                    <input type="month" id="targetMonth" name="targetMonth"
                           class="form-control"
                           th:value="${targetMonth}"
                           required>
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-play-fill me-1"></i>Simular
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Empty state: no target yet -->
    <div th:if="${progression == null}" class="text-center text-muted py-5">
        <i class="bi bi-calendar2-range fs-1"></i>
        <p class="mt-3">Selecciona una fecha objetivo para ver la progresión de tus deudas.</p>
    </div>

    <!-- Empty state: target selected but no active debts -->
    <div th:if="${progression != null and progression.empty}" class="text-center text-muted py-5">
        <i class="bi bi-check-circle fs-1 text-success"></i>
        <p class="mt-3">¡No hay deudas activas para proyectar en ese rango!</p>
    </div>

    <!-- Timeline -->
    <div th:if="${progression != null and !progression.empty}">
        <div th:each="entry, iterStat : ${progression}">

            <!-- Month row -->
            <div class="d-flex align-items-start mb-1">
                <!-- Dot -->
                <div th:classappend="${entry.cards.stream().anyMatch(c -> !c.closingDebts().isEmpty())} ? 'bg-success' : 'bg-primary'"
                     class="timeline-dot flex-shrink-0 d-flex align-items-center justify-content-center text-white me-3 mt-1">
                </div>

                <!-- Month card -->
                <div class="flex-grow-1 mb-3">
                    <div class="card border-0 shadow-sm">
                        <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
                            <h5 class="mb-0 text-capitalize fw-bold" th:text="${entry.displayName}">Mes</h5>
                            <span class="fs-5 fw-bold text-primary"
                                  th:text="${'$' + #numbers.formatDecimal(entry.totalPayment, 1, 'COMMA', 2, 'POINT')}">$0.00</span>
                        </div>
                        <div class="card-body p-0">

                            <!-- Per-card rows -->
                            <div th:each="card, cardStat : ${entry.cards}"
                                 th:classappend="${!cardStat.last} ? 'border-bottom' : ''"
                                 class="px-4 py-3">

                                <div class="d-flex justify-content-between align-items-center">
                                    <div>
                                        <span class="fw-semibold" th:text="${card.accountName}">Card</span>
                                        <small class="text-muted font-monospace ms-2" th:text="${card.accountCode}"></small>
                                    </div>
                                    <span class="fw-semibold text-secondary"
                                          th:text="${'$' + #numbers.formatDecimal(card.cardPayment, 1, 'COMMA', 2, 'POINT')}">$0.00</span>
                                </div>

                                <!-- Closing debts -->
                                <div th:if="${!card.closingDebts().isEmpty()}" class="mt-2">
                                    <small class="text-success fw-semibold">
                                        <i class="bi bi-check-circle me-1"></i>Se liquidan este mes:
                                    </small>
                                    <div class="d-flex flex-wrap gap-1 mt-1">
                                        <span th:each="debt : ${card.closingDebts()}"
                                              class="badge bg-success-subtle text-success closing-badge"
                                              th:text="${debt.description}">Deuda</span>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            </div>

            <!-- Connecting line (not after last item) -->
            <div th:unless="${iterStat.last}" class="timeline-line mb-0" style="height: 0.5rem;"></div>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
