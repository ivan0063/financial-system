<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Progresión de Deudas – Financial Manager</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        .summary-row { cursor: pointer; }
        .summary-row:hover td { background-color: #f0f4ff; }
        .detail-row td { background-color: #f8f9fa; padding: 0; }
        .chevron-icon { transition: transform 0.2s; }
        .summary-row[aria-expanded="true"] .chevron-icon { transform: rotate(180deg); }
    </style>
</head>
<body class="bg-light">

<div th:replace="~{layout/navbar :: navbar}"></div>

<div class="container py-4">

    <!-- Header -->
    <div class="d-flex align-items-center mb-4">
        <a th:href="@{/ui/dashboard}" class="btn btn-outline-secondary me-3">
            <i class="bi bi-arrow-left"></i>
        </a>
        <div>
            <h2 class="fw-bold mb-0">
                <i class="bi bi-calendar2-range me-2 text-primary"></i>Progresión de Deudas
            </h2>
            <small class="text-muted">Simulación mes a mes hasta la fecha objetivo</small>
        </div>
    </div>

    <!-- Target month form -->
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body">
            <form method="get" th:action="@{/ui/progression}" class="row g-3 align-items-end">
                <div class="col-md-4">
                    <label for="targetMonth" class="form-label fw-semibold">Fecha objetivo</label>
                    <input type="month" id="targetMonth" name="targetMonth"
                           class="form-control"
                           th:value="${targetMonth}"
                           required>
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-play-fill me-1"></i>Simular
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Empty state: no target yet -->
    <div th:if="${progression == null}" class="text-center text-muted py-5">
        <i class="bi bi-calendar2-range fs-1"></i>
        <p class="mt-3">Selecciona una fecha objetivo para ver la progresión de tus deudas.</p>
    </div>

    <!-- Empty state: no active debts -->
    <div th:if="${progression != null and progression.empty}" class="text-center text-muted py-5">
        <i class="bi bi-check-circle fs-1 text-success"></i>
        <p class="mt-3">¡No hay deudas activas para proyectar en ese rango!</p>
    </div>

    <!-- Progression table -->
    <div th:if="${progression != null and !progression.empty}" class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table table-bordered mb-0 align-middle">
                <thead class="table-dark">
                    <tr>
                        <th style="width: 40%">Mes</th>
                        <th style="width: 45%">Pago total</th>
                        <th style="width: 15%" class="text-center">Detalle</th>
                    </tr>
                </thead>
                <tbody>
                    <th:block th:each="entry, iterStat : ${progression}">

                        <!-- Summary row (clickable) -->
                        <tr class="summary-row"
                            th:classappend="${entry.hasClosingDebts()} ? 'table-success' : ''"
                            data-bs-toggle="collapse"
                            th:attr="data-bs-target='#detail-' + ${iterStat.index}, aria-expanded='false', aria-controls='detail-' + ${iterStat.index}">
                            <td class="fw-semibold text-capitalize" th:text="${entry.displayName}">Mes</td>
                            <td class="fw-bold"
                                th:text="${'$' + #numbers.formatDecimal(entry.totalPayment, 1, 'COMMA', 2, 'POINT')}">$0.00</td>
                            <td class="text-center">
                                <i class="bi bi-chevron-down chevron-icon text-secondary"></i>
                            </td>
                        </tr>

                        <!-- Detail row (collapsed) -->
                        <tr>
                            <td colspan="3" class="detail-row p-0">
                                <div class="collapse" th:id="'detail-' + ${iterStat.index}">
                                    <div class="p-3">
                                        <table class="table table-sm table-bordered mb-0 bg-white">
                                            <thead class="table-secondary">
                                                <tr>
                                                    <th>Tarjeta</th>
                                                    <th>Pago</th>
                                                    <th>Deudas que cierran</th>
                                                    <th class="text-center">Activas</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <tr th:each="card : ${entry.cards}">
                                                    <td>
                                                        <span class="fw-semibold" th:text="${card.accountName}">Card</span>
                                                        <br>
                                                        <small class="text-muted font-monospace" th:text="${card.accountCode}"></small>
                                                    </td>
                                                    <td class="fw-semibold"
                                                        th:text="${'$' + #numbers.formatDecimal(card.cardPayment, 1, 'COMMA', 2, 'POINT')}">$0.00</td>
                                                    <td>
                                                        <span th:if="${card.closingDebts().isEmpty()}" class="text-muted small">—</span>
                                                        <div th:unless="${card.closingDebts().isEmpty()}" class="d-flex flex-wrap gap-1">
                                                            <span th:each="debt : ${card.closingDebts()}"
                                                                  class="badge bg-success"
                                                                  th:text="${debt.description}">Deuda</span>
                                                        </div>
                                                    </td>
                                                    <td class="text-center">
                                                        <span class="badge bg-secondary" th:text="${card.activeDebtCount()}">0</span>
                                                    </td>
                                                </tr>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </td>
                        </tr>

                    </th:block>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Rotate chevron when row collapses/expands
    document.querySelectorAll('.summary-row').forEach(row => {
        const targetId = row.getAttribute('data-bs-target');
        const detail = document.querySelector(targetId);
        if (!detail) return;
        detail.addEventListener('show.bs.collapse', () => row.setAttribute('aria-expanded', 'true'));
        detail.addEventListener('hide.bs.collapse', () => row.setAttribute('aria-expanded', 'false'));
    });
</script>
</body>
</html>
