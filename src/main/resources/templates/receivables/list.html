<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Receivables – Financial Manager</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">

<div th:replace="~{layout/navbar :: navbar}"></div>

<div class="container">
    <div class="d-flex align-items-center mb-4">
        <h2 class="fw-bold mb-0">
            <i class="bi bi-people me-2 text-primary"></i>
            Receivables
            <small class="fs-6 text-muted fw-normal ms-2">money you lent out (e.g. to relatives)</small>
        </h2>
    </div>

    <!-- Summary -->
    <div class="row mb-4">
        <div class="col-sm-6">
            <div class="card shadow-sm border-0 bg-primary-subtle">
                <div class="card-body">
                    <div class="text-muted small">Total pending</div>
                    <div class="fs-3 fw-bold" th:text="${'$' + #numbers.formatDecimal(totalPending, 1, 2)}"></div>
                </div>
            </div>
        </div>
        <div class="col-sm-6">
            <div class="card shadow-sm border-0 bg-secondary-subtle">
                <div class="card-body">
                    <div class="text-muted small">Active loans</div>
                    <div class="fs-3 fw-bold" th:text="${activeCount}"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Receivable Form -->
    <div class="card shadow-sm mb-4">
        <div class="card-header bg-white">
            <h6 class="mb-0 fw-semibold"><i class="bi bi-plus-circle me-2"></i>Lend Money</h6>
        </div>
        <div class="card-body">
            <form th:action="@{/ui/receivables}" th:object="${newReceivable}" method="post">
                <div class="row g-2">
                    <div class="col-sm-3">
                        <input type="text" th:field="*{debtorName}" class="form-control" placeholder="Who owes you?" required>
                    </div>
                    <div class="col-sm-3">
                        <input type="text" th:field="*{description}" class="form-control" placeholder="Reason / note">
                    </div>
                    <div class="col-sm-2">
                        <input type="number" th:field="*{principalAmount}" step="0.01" class="form-control" placeholder="Amount lent" required>
                    </div>
                    <div class="col-sm-3">
                        <input type="date" th:field="*{lentDate}" class="form-control">
                    </div>
                    <div class="col-sm-1">
                        <button type="submit" class="btn btn-primary w-100"><i class="bi bi-plus-lg"></i></button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Receivables Table -->
    <div class="card shadow-sm" th:if="${!receivables.empty}">
        <div class="table-responsive">
            <table class="table table-hover mb-0 align-middle">
                <thead class="table-dark">
                <tr>
                    <th>Debtor</th>
                    <th>Description</th>
                    <th>Lent</th>
                    <th>Repaid</th>
                    <th>Pending</th>
                    <th style="min-width: 140px;">Progress</th>
                    <th>Status</th>
                    <th>Register Payment</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="entry : ${receivables}">
                    <td th:text="${entry.receivable.debtorName}"></td>
                    <td th:text="${entry.receivable.description}"></td>
                    <td th:text="${'$' + #numbers.formatDecimal(entry.receivable.principalAmount, 1, 2)}"></td>
                    <td th:text="${'$' + #numbers.formatDecimal(entry.totalRepaid, 1, 2)}"></td>
                    <td class="fw-semibold" th:text="${'$' + #numbers.formatDecimal(entry.pendingAmount, 1, 2)}"></td>
                    <td>
                        <div class="progress" style="height: 8px;">
                            <div class="progress-bar" role="progressbar"
                                 th:style="'width: ' + ${entry.percentPaid} + '%'"
                                 th:classappend="${entry.fullyPaid} ? 'bg-success' : 'bg-info'"></div>
                        </div>
                        <small class="text-muted" th:text="${#numbers.formatDecimal(entry.percentPaid, 1, 1)} + '%'"></small>
                    </td>
                    <td>
                        <span class="badge" th:classappend="${entry.fullyPaid} ? 'bg-success' : 'bg-warning text-dark'"
                              th:text="${entry.fullyPaid} ? 'Fully Paid' : 'Pending'"></span>
                    </td>
                    <td>
                        <form th:action="@{/ui/receivables/{id}/payment(id=${entry.receivable.id})}" method="post"
                              class="d-flex gap-1" th:unless="${entry.fullyPaid}">
                            <input type="number" name="amount" step="0.01" class="form-control form-control-sm" placeholder="Amount" required style="width: 100px;">
                            <input type="text" name="note" class="form-control form-control-sm" placeholder="Note" style="width: 120px;">
                            <button type="submit" class="btn btn-sm btn-outline-success">
                                <i class="bi bi-cash-coin"></i>
                            </button>
                        </form>
                    </td>
                    <td>
                        <form th:action="@{/ui/receivables/{id}(id=${entry.receivable.id})}" method="post">
                            <input type="hidden" name="_method" value="DELETE">
                            <button type="submit" class="btn btn-sm btn-outline-danger"
                                    onclick="return confirm('Delete this receivable?')">
                                <i class="bi bi-trash"></i>
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
    <div class="alert alert-info" th:if="${receivables.empty}">
        <i class="bi bi-info-circle me-2"></i>No receivables yet — record money you've lent out above.
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
