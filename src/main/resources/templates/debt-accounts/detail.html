<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Account Detail – Financial Manager</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">

<div th:replace="~{layout/navbar :: navbar}"></div>

<div class="container">
    <div class="d-flex align-items-center mb-4">
        <a th:href="@{/ui/providers}" class="btn btn-outline-secondary me-3">
            <i class="bi bi-arrow-left"></i>
        </a>
        <div>
            <h2 class="fw-bold mb-0">
                <i class="bi bi-credit-card me-2 text-primary"></i>
                <span th:text="${account?.name ?: debtAccountCode}">Account</span>
            </h2>
            <small class="text-muted font-monospace" th:text="${debtAccountCode}"></small>
        </div>
    </div>

    <!-- Account Status Cards -->
    <div class="row g-3 mb-4" th:if="${status != null}">
        <div class="col-md-4">
            <div class="card border-0 shadow-sm text-bg-primary">
                <div class="card-body">
                    <div class="small fw-semibold text-uppercase opacity-75">Monthly Payment</div>
                    <div class="fs-4 fw-bold" th:text="${'$' + #numbers.formatDecimal(status.monthPayment, 1, 2)}">$0.00</div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-0 shadow-sm text-bg-secondary">
                <div class="card-body">
                    <div class="small fw-semibold text-uppercase opacity-75">Active Debts</div>
                    <div class="fs-4 fw-bold" th:text="${debts.size()}">0</div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-0 shadow-sm text-bg-warning">
                <div class="card-body">
                    <div class="small fw-semibold text-uppercase opacity-75">Almost Completed</div>
                    <div class="fs-4 fw-bold" th:text="${status.almostCompletedDebts?.size() ?: 0}">0</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Actions -->
    <div class="d-flex gap-2 mb-4">
        <form th:action="@{/ui/debts/{code}/pay-off(code=${debtAccountCode})}" method="post">
            <button type="submit" class="btn btn-success"
                    onclick="return confirm('Pay off all debts for this account?')">
                <i class="bi bi-check2-circle me-2"></i>Pay Off Debts
            </button>
        </form>
        <a th:href="@{/ui/payments/{code}(code=${debtAccountCode})}" class="btn btn-outline-secondary">
            <i class="bi bi-clock-history me-1"></i>Payment History
        </a>
    </div>

    <!-- Add Debt Form -->
    <div class="card shadow-sm mb-4">
        <div class="card-header bg-white">
            <h6 class="mb-0 fw-semibold"><i class="bi bi-plus-circle me-2"></i>Add Debt</h6>
        </div>
        <div class="card-body">
            <form th:action="@{/ui/debts/{code}(code=${debtAccountCode})}" method="post">
                <div class="row g-2">
                    <div class="col-sm-4">
                        <input type="text" name="description" class="form-control" placeholder="Description" required>
                    </div>
                    <div class="col-sm-2">
                        <input type="date" name="operationDate" class="form-control">
                    </div>
                    <div class="col-sm-2">
                        <input type="number" name="originalAmount" step="0.01" class="form-control" placeholder="Amount">
                    </div>
                    <div class="col-sm-1">
                        <input type="number" name="currentInstallment" class="form-control" placeholder="Inst." min="1">
                    </div>
                    <div class="col-sm-1">
                        <input type="number" name="maxFinancingTerm" class="form-control" placeholder="Max" min="1">
                    </div>
                    <div class="col-sm-1">
                        <input type="number" name="monthlyPayment" step="0.01" class="form-control" placeholder="Monthly">
                    </div>
                    <div class="col-sm-1">
                        <button type="submit" class="btn btn-primary w-100"><i class="bi bi-plus-lg"></i></button>
                    </div>
                </div>
                <div class="row g-2 mt-1">
                    <div class="col-auto">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="active" value="true" id="activeCheck" checked>
                            <label class="form-check-label" for="activeCheck">Active</label>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Debts Table -->
    <div class="card shadow-sm" th:if="${!debts.empty}">
        <div class="card-header bg-white">
            <h5 class="mb-0 fw-semibold"><i class="bi bi-list-ul me-2"></i>Active Debts</h5>
        </div>
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                <tr>
                    <th>Description</th>
                    <th>Date</th>
                    <th>Original Amount</th>
                    <th>Monthly Payment</th>
                    <th>Progress</th>
                    <th>Type</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="debt : ${debts}">
                    <td th:text="${debt.description}"></td>
                    <td th:text="${debt.operationDate}"></td>
                    <td th:text="${debt.originalAmount != null ? '$' + #numbers.formatDecimal(debt.originalAmount, 1, 2) : '-'}"></td>
                    <td th:text="${debt.monthlyPayment != null ? '$' + #numbers.formatDecimal(debt.monthlyPayment, 1, 2) : '-'}"></td>
                    <td style="min-width: 140px;" th:if="${debt.maxFinancingTerm != null and debt.maxFinancingTerm > 0}">
                        <div class="d-flex align-items-center gap-1">
                            <div class="progress flex-grow-1" style="height: 6px;">
                                <div class="progress-bar"
                                     th:style="${'width: ' + (debt.currentInstallment * 100 / debt.maxFinancingTerm) + '%'}"></div>
                            </div>
                            <small class="text-muted text-nowrap"
                                   th:text="${debt.currentInstallment + '/' + debt.maxFinancingTerm}"></small>
                        </div>
                    </td>
                    <td th:unless="${debt.maxFinancingTerm != null and debt.maxFinancingTerm > 0}">
                        <span class="text-muted">—</span>
                    </td>
                    <td><span class="badge bg-info text-dark" th:text="${debt.debtType}"></span></td>
                    <td>
                        <form th:action="@{/ui/debts/{id}(id=${debt.id})}" method="post">
                            <input type="hidden" name="_method" value="DELETE">
                            <input type="hidden" name="debtAccountCode" th:value="${debtAccountCode}">
                            <button type="submit" class="btn btn-sm btn-outline-danger"
                                    onclick="return confirm('Delete this debt?')">
                                <i class="bi bi-trash"></i>
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
    <div class="alert alert-info" th:if="${debts.empty}">
        <i class="bi bi-info-circle me-2"></i>No active debts for this account.
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
