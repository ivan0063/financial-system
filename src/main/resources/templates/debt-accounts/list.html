<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Debt Accounts – Financial Manager</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">

<div th:replace="~{layout/navbar :: navbar}"></div>

<div class="container">
    <div class="d-flex align-items-center mb-4">
        <a th:href="@{/ui/providers}" class="btn btn-outline-secondary me-3">
            <i class="bi bi-arrow-left"></i>
        </a>
        <h2 class="fw-bold mb-0">
            <i class="bi bi-credit-card-2-front me-2 text-primary"></i>
            Debt Accounts
            <small class="fs-6 text-muted fw-normal ms-2">for provider: <span class="font-monospace" th:text="${providerCode}"></span></small>
        </h2>
    </div>

    <!-- Add Account Form -->
    <div class="card shadow-sm mb-4">
        <div class="card-header bg-white">
            <h6 class="mb-0 fw-semibold"><i class="bi bi-plus-circle me-2"></i>Add Debt Account</h6>
        </div>
        <div class="card-body">
            <form th:action="@{/ui/debt-accounts/{code}(code=${providerCode})}" method="post">
                <div class="row g-2">
                    <div class="col-sm-2">
                        <input type="text" name="code" class="form-control" placeholder="Code" required>
                    </div>
                    <div class="col-sm-3">
                        <input type="text" name="name" class="form-control" placeholder="Account name" required>
                    </div>
                    <div class="col-sm-2">
                        <input type="number" name="payDay" class="form-control" placeholder="Pay day" min="1" max="31">
                    </div>
                    <div class="col-sm-2">
                        <input type="number" name="credit" step="0.01" class="form-control" placeholder="Credit limit">
                    </div>
                    <div class="col-sm-2">
                        <select name="accountStatementType" class="form-select">
                            <option value="">Statement type</option>
                            <option th:each="type : ${statementTypes}"
                                    th:value="${type}"
                                    th:text="${type}"></option>
                        </select>
                    </div>
                    <div class="col-sm-1">
                        <button type="submit" class="btn btn-primary w-100"><i class="bi bi-plus-lg"></i></button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Accounts Table -->
    <div class="card shadow-sm" th:if="${!accounts.empty}">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                <tr>
                    <th>Code</th>
                    <th>Name</th>
                    <th>Pay Day</th>
                    <th>Credit</th>
                    <th>Statement Type</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="account : ${accounts}">
                    <td class="font-monospace" th:text="${account.code}"></td>
                    <td th:text="${account.name}"></td>
                    <td th:text="${account.payDay}"></td>
                    <td th:text="${'$' + #numbers.formatDecimal(account.credit, 1, 2)}"></td>
                    <td><span class="badge bg-secondary" th:text="${account.accountStatementType}"></span></td>
                    <td class="d-flex gap-1">
                        <a th:href="@{/ui/debt-accounts/{code}(code=${account.code})}"
                           class="btn btn-sm btn-outline-primary">
                            <i class="bi bi-list-ul"></i> Debts
                        </a>
                        <a th:href="@{/ui/payments/{code}(code=${account.code})}"
                           class="btn btn-sm btn-outline-secondary">
                            <i class="bi bi-clock-history"></i>
                        </a>
                        <form th:action="@{/ui/debt-accounts/{code}(code=${account.code})}" method="post">
                            <input type="hidden" name="_method" value="DELETE">
                            <input type="hidden" name="providerCode" th:value="${providerCode}">
                            <button type="submit" class="btn btn-sm btn-outline-danger"
                                    onclick="return confirm('Delete this account?')">
                                <i class="bi bi-trash"></i>
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
    <div class="alert alert-info" th:if="${accounts.empty}">
        <i class="bi bi-info-circle me-2"></i>No debt accounts yet for this provider.
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
