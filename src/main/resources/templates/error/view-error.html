<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Error – Financial Manager</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">

<div th:replace="~{layout/navbar :: navbar}"></div>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card border-danger shadow-sm">
                <div class="card-header bg-danger text-white d-flex align-items-center gap-2">
                    <i class="bi bi-bug-fill fs-5"></i>
                    <span class="fw-semibold">Something went wrong</span>
                </div>
                <div class="card-body">
                    <p class="text-muted mb-3">
                        An error occurred while processing your request. The full details have been
                        recorded in the <strong>Activity Log</strong>
                        <i class="bi bi-terminal ms-1"></i> — open it from the top-right button.
                    </p>

                    <div class="mb-3">
                        <label class="form-label fw-semibold small text-muted text-uppercase">Exception</label>
                        <div class="font-monospace small p-2 bg-light border rounded"
                             th:text="${errorType}">UnknownError</div>
                    </div>

                    <div class="mb-3" th:if="${errorMessage != null}">
                        <label class="form-label fw-semibold small text-muted text-uppercase">Message</label>
                        <div class="font-monospace small p-2 bg-danger bg-opacity-10 border border-danger border-opacity-25 rounded"
                             th:text="${errorMessage}"
                             style="word-break: break-word; white-space: pre-wrap;"></div>
                    </div>

                    <div class="mb-4" th:if="${errorCause != null}">
                        <label class="form-label fw-semibold small text-muted text-uppercase">Caused by</label>
                        <div class="font-monospace small p-2 bg-light border rounded"
                             th:text="${errorCause}"
                             style="word-break: break-word; white-space: pre-wrap;"></div>
                    </div>

                    <div class="d-flex gap-2">
                        <button onclick="history.back()" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left me-1"></i>Go back
                        </button>
                        <a th:href="@{/ui/dashboard}" class="btn btn-primary">
                            <i class="bi bi-speedometer2 me-1"></i>Dashboard
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
