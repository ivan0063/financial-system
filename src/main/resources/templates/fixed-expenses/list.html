<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fixed Expenses – Financial Manager</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">

<div th:replace="~{layout/navbar :: navbar}"></div>

<div class="container">
    <h2 class="mb-4 fw-bold"><i class="bi bi-receipt me-2 text-primary"></i>Fixed Expenses</h2>

    <div class="row g-4">
        <!-- Expense Catalogs -->
        <div class="col-lg-4">
            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    <h6 class="mb-0 fw-semibold"><i class="bi bi-collection me-2"></i>Expense Categories</h6>
                </div>
                <div class="card-body">
                    <form th:action="@{/ui/fixed-expenses/catalog}" method="post" class="d-flex gap-2 mb-3">
                        <input type="text" name="name" class="form-control" placeholder="New category" required>
                        <button type="submit" class="btn btn-primary text-nowrap">
                            <i class="bi bi-plus-lg"></i> Add
                        </button>
                    </form>
                    <div class="list-group" th:if="${!catalogs.empty}">
                        <div th:each="catalog : ${catalogs}"
                             class="list-group-item d-flex justify-content-between align-items-center">
                            <span>
                                <i class="bi bi-tag me-2 text-muted"></i>
                                <span th:text="${catalog.name}"></span>
                                <small class="text-muted ms-2">#<span th:text="${catalog.id}"></span></small>
                            </span>
                            <form th:action="@{/ui/fixed-expenses/catalog/{id}(id=${catalog.id})}" method="post">
                                <input type="hidden" name="_method" value="DELETE">
                                <button type="submit" class="btn btn-outline-danger btn-sm"
                                        onclick="return confirm('Delete this category?')">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                    <p class="text-muted text-center mt-2" th:if="${catalogs.empty}">
                        <i class="bi bi-inbox me-1"></i>No categories yet.
                    </p>
                </div>
            </div>
        </div>

        <!-- Fixed Expenses -->
        <div class="col-lg-8">
            <div class="card shadow-sm">
                <div class="card-header bg-white d-flex justify-content-between align-items-center">
                    <h6 class="mb-0 fw-semibold"><i class="bi bi-list-check me-2"></i>My Fixed Expenses</h6>
                    <div class="d-flex gap-2">
                        <button type="button" class="btn btn-sm btn-outline-secondary" id="bulkEditBtn" disabled
                                data-bs-toggle="modal" data-bs-target="#bulkEditModal">
                            <i class="bi bi-pencil-square"></i> Bulk Edit
                        </button>
                        <button type="button" class="btn btn-sm btn-outline-danger" id="bulkDeleteBtn" disabled>
                            <i class="bi bi-trash"></i> Delete Selected
                        </button>
                    </div>
                </div>
                <div class="card-body">
                    <!-- Add Expense Form -->
                    <form th:action="@{/ui/fixed-expenses}" method="post" class="mb-3">
                        <div class="row g-2">
                            <div class="col-sm-3">
                                <input type="text" name="name" class="form-control" placeholder="Expense name" required>
                            </div>
                            <div class="col-sm-3">
                                <input type="text" name="description" class="form-control" placeholder="Description">
                            </div>
                            <div class="col-sm-2">
                                <input type="number" name="monthlyCost" step="0.01" class="form-control" placeholder="Monthly cost">
                            </div>
                            <div class="col-sm-1">
                                <input type="number" name="paymentDay" class="form-control" placeholder="Day" min="1" max="31">
                            </div>
                            <div class="col-sm-2">
                                <select name="catalogId" class="form-select" required>
                                    <option value="">-- Category --</option>
                                    <option th:each="cat : ${catalogs}"
                                            th:value="${cat.id}"
                                            th:text="${cat.name}"></option>
                                </select>
                            </div>
                            <div class="col-sm-1">
                                <button type="submit" class="btn btn-primary w-100">
                                    <i class="bi bi-plus-lg"></i>
                                </button>
                            </div>
                        </div>
                    </form>

                    <!-- Expenses Table -->
                    <div class="table-responsive" th:if="${!expenses.empty}">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                            <tr>
                                <th><input type="checkbox" id="selectAll" class="form-check-input"></th>
                                <th>Name</th>
                                <th>Description</th>
                                <th>Category</th>
                                <th>Monthly Cost</th>
                                <th>Pay Day</th>
                                <th></th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="expense : ${expenses}">
                                <td>
                                    <input type="checkbox" class="form-check-input expense-checkbox" name="ids" th:value="${expense.id}">
                                </td>
                                <td th:text="${expense.name}"></td>
                                <td th:text="${expense.description}"></td>
                                <td th:text="${expense.fixedExpenseCatalog?.name}"></td>
                                <td th:text="${'$' + #numbers.formatDecimal(expense.monthlyCost, 1, 2)}"></td>
                                <td th:text="${expense.paymentDay}"></td>
                                <td class="text-nowrap">
                                    <button type="button" class="btn btn-sm btn-outline-primary edit-expense-btn"
                                            data-bs-toggle="modal" data-bs-target="#editExpenseModal"
                                            th:data-id="${expense.id}"
                                            th:data-name="${expense.name}"
                                            th:data-description="${expense.description}"
                                            th:data-monthly-cost="${expense.monthlyCost}"
                                            th:data-payment-day="${expense.paymentDay}"
                                            th:data-catalog-id="${expense.fixedExpenseCatalog?.id}">
                                        <i class="bi bi-pencil"></i>
                                    </button>
                                    <form th:action="@{/ui/fixed-expenses/{id}(id=${expense.id})}" method="post" class="d-inline">
                                        <input type="hidden" name="_method" value="DELETE">
                                        <button type="submit" class="btn btn-sm btn-outline-danger"
                                                onclick="return confirm('Delete this expense?')">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </form>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                    <p class="text-muted text-center mt-3" th:if="${expenses.empty}">
                        <i class="bi bi-inbox me-1"></i>No fixed expenses yet.
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Edit Expense Modal -->
<div class="modal fade" id="editExpenseModal" tabindex="-1">
    <div class="modal-dialog">
        <form id="editExpenseForm" method="post" class="modal-content">
            <input type="hidden" name="_method" value="PUT">
            <div class="modal-header">
                <h5 class="modal-title"><i class="bi bi-pencil-square me-2"></i>Edit Fixed Expense</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label">Name</label>
                    <input type="text" name="name" id="editName" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <input type="text" name="description" id="editDescription" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Monthly Cost</label>
                    <input type="number" step="0.01" name="monthlyCost" id="editMonthlyCost" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Pay Day</label>
                    <input type="number" min="1" max="31" name="paymentDay" id="editPaymentDay" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Category</label>
                    <select name="catalogId" id="editCatalogId" class="form-select" required>
                        <option th:each="cat : ${catalogs}"
                                th:value="${cat.id}"
                                th:text="${cat.name}"></option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="submit" class="btn btn-primary">Save Changes</button>
            </div>
        </form>
    </div>
</div>

<!-- Bulk Edit Modal -->
<div class="modal fade" id="bulkEditModal" tabindex="-1">
    <div class="modal-dialog">
        <form id="bulkEditForm" th:action="@{/ui/fixed-expenses/bulk-edit}" method="post" class="modal-content">
            <input type="hidden" name="_method" value="PUT">
            <div class="modal-header">
                <h5 class="modal-title"><i class="bi bi-pencil-square me-2"></i>Bulk Edit Selected Expenses</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p class="text-muted">Leave a field blank to keep its current value for each selected expense.</p>
                <div class="mb-3">
                    <label class="form-label">Category</label>
                    <select name="catalogId" class="form-select">
                        <option value="">-- Don't change --</option>
                        <option th:each="cat : ${catalogs}"
                                th:value="${cat.id}"
                                th:text="${cat.name}"></option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Monthly Cost</label>
                    <input type="number" step="0.01" name="monthlyCost" class="form-control" placeholder="Don't change">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="submit" class="btn btn-primary">Apply to Selected</button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
(function () {
    const checkboxes = () => Array.from(document.querySelectorAll('.expense-checkbox'));
    const selectAll = document.getElementById('selectAll');
    const bulkEditBtn = document.getElementById('bulkEditBtn');
    const bulkDeleteBtn = document.getElementById('bulkDeleteBtn');

    function refreshBulkButtons() {
        const anyChecked = checkboxes().some(cb => cb.checked);
        bulkEditBtn.disabled = !anyChecked;
        bulkDeleteBtn.disabled = !anyChecked;
    }

    if (selectAll) {
        selectAll.addEventListener('change', () => {
            checkboxes().forEach(cb => cb.checked = selectAll.checked);
            refreshBulkButtons();
        });
    }
    checkboxes().forEach(cb => cb.addEventListener('change', refreshBulkButtons));

    function selectedIds() {
        return checkboxes().filter(cb => cb.checked).map(cb => cb.value);
    }

    function appendIds(form) {
        selectedIds().forEach(id => {
            const input = document.createElement('input');
            input.type = 'hidden';
            input.name = 'ids';
            input.value = id;
            form.appendChild(input);
        });
    }

    document.getElementById('bulkEditForm').addEventListener('submit', function (e) {
        appendIds(this);
    });

    bulkDeleteBtn.addEventListener('click', function () {
        const ids = selectedIds();
        if (ids.length === 0) return;
        if (!confirm('Delete ' + ids.length + ' selected expense(s)?')) return;

        const form = document.createElement('form');
        form.method = 'post';
        form.action = /*[[@{/ui/fixed-expenses/bulk-delete}]]*/ '';

        const methodInput = document.createElement('input');
        methodInput.type = 'hidden';
        methodInput.name = '_method';
        methodInput.value = 'DELETE';
        form.appendChild(methodInput);

        ids.forEach(id => {
            const input = document.createElement('input');
            input.type = 'hidden';
            input.name = 'ids';
            input.value = id;
            form.appendChild(input);
        });

        document.body.appendChild(form);
        form.submit();
    });

    document.querySelectorAll('.edit-expense-btn').forEach(btn => {
        btn.addEventListener('click', function () {
            const id = this.dataset.id;
            document.getElementById('editName').value = this.dataset.name || '';
            document.getElementById('editDescription').value = this.dataset.description || '';
            document.getElementById('editMonthlyCost').value = this.dataset.monthlyCost || '';
            document.getElementById('editPaymentDay').value = this.dataset.paymentDay || '';
            document.getElementById('editCatalogId').value = this.dataset.catalogId || '';
            document.getElementById('editExpenseForm').action = '/ui/fixed-expenses/' + id;
        });
    });
})();
</script>
</body>
</html>
