<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Providers – Financial Manager</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">

<div th:replace="~{layout/navbar :: navbar}"></div>

<div class="container">
    <h2 class="mb-4 fw-bold"><i class="bi bi-bank me-2 text-primary"></i>Financial Providers</h2>

    <div class="row g-4">
        <!-- Provider Catalogs -->
        <div class="col-lg-5">
            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    <h5 class="mb-0 fw-semibold"><i class="bi bi-collection me-2"></i>Provider Catalog</h5>
                </div>
                <div class="card-body">
                    <form th:action="@{/ui/providers/catalog}" method="post" class="d-flex gap-2 mb-3">
                        <input type="text" name="name" class="form-control" placeholder="New catalog name" required>
                        <button type="submit" class="btn btn-primary text-nowrap">
                            <i class="bi bi-plus-lg"></i> Add
                        </button>
                    </form>
                    <div class="list-group" th:if="${!catalogs.empty}">
                        <div th:each="catalog : ${catalogs}"
                             class="list-group-item d-flex justify-content-between align-items-center">
                            <span><i class="bi bi-tag me-2 text-muted"></i>
                                <span th:text="${catalog.name}"></span>
                                <small class="text-muted ms-2">#<span th:text="${catalog.id}"></span></small>
                            </span>
                            <form th:action="@{/ui/providers/catalog/{id}(id=${catalog.id})}" method="post">
                                <input type="hidden" name="_method" value="DELETE">
                                <button type="submit" class="btn btn-outline-danger btn-sm"
                                        onclick="return confirm('Delete this catalog?')">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                    <p class="text-muted text-center mt-3" th:if="${catalogs.empty}">
                        <i class="bi bi-inbox me-1"></i>No catalogs yet.
                    </p>
                </div>
            </div>
        </div>

        <!-- My Providers -->
        <div class="col-lg-7">
            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    <h5 class="mb-0 fw-semibold"><i class="bi bi-building me-2"></i>My Providers</h5>
                </div>
                <div class="card-body">
                    <!-- Add Provider Form -->
                    <form th:action="@{/ui/providers}" method="post" class="mb-3">
                        <div class="row g-2">
                            <div class="col-sm-3">
                                <input type="text" name="code" class="form-control" placeholder="Code" required>
                            </div>
                            <div class="col-sm-4">
                                <input type="text" name="name" class="form-control" placeholder="Name" required>
                            </div>
                            <div class="col-sm-3">
                                <select name="catalogId" class="form-select" required>
                                    <option value="">-- Catalog --</option>
                                    <option th:each="cat : ${catalogs}"
                                            th:value="${cat.id}"
                                            th:text="${cat.name}"></option>
                                </select>
                            </div>
                            <div class="col-sm-2">
                                <button type="submit" class="btn btn-primary w-100">
                                    <i class="bi bi-plus-lg"></i>
                                </button>
                            </div>
                        </div>
                    </form>

                    <!-- Providers List -->
                    <div class="table-responsive" th:if="${!providers.empty}">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                            <tr>
                                <th>Code</th>
                                <th>Name</th>
                                <th>Catalog</th>
                                <th>Actions</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="provider : ${providers}">
                                <td class="font-monospace small" th:text="${provider.code}"></td>
                                <td th:text="${provider.name}"></td>
                                <td th:text="${provider.financialProviderCatalog?.name}"></td>
                                <td class="d-flex gap-1">
                                    <a th:href="@{/ui/debt-accounts(providerCode=${provider.code})}"
                                       class="btn btn-sm btn-outline-primary">
                                        <i class="bi bi-credit-card-2-front"></i> Accounts
                                    </a>
                                    <form th:action="@{/ui/providers/{code}(code=${provider.code})}" method="post">
                                        <input type="hidden" name="_method" value="DELETE">
                                        <button type="submit" class="btn btn-sm btn-outline-danger"
                                                onclick="return confirm('Delete this provider?')">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </form>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                    <p class="text-muted text-center mt-3" th:if="${providers.empty}">
                        <i class="bi bi-inbox me-1"></i>No providers yet.
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
